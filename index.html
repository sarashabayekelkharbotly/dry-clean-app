<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Our Welcome Home — سجل الغسيل</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f9f0f0;
  --surface: #ffffff;
  --surface2: #fdf6f6;
  --surface3: #f5eaea;
  --primary: #cc5f5f;
  --primary-light: #e08080;
  --primary-dark: #a84545;
  --accent: #b8c9d9;
  --accent-dark: #8aaabf;
  --text: #1a1a1a;
  --text2: #555555;
  --text3: #999999;
  --border: #e8d8d8;
  --ok: #5caa7f;
  --warn: #e8a838;
  --danger: #cc5f5f;
  --radius: 18px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(204,95,95,0.08);
  --shadow-lg: 0 8px 32px rgba(204,95,95,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* HEADER */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.header-logo { height: 44px; width: auto; }
.header-right { text-align: left; }
.header-date { font-size: 11px; color: var(--text3); }
.sync-btn {
  background: none; border: none; cursor: pointer;
  color: var(--primary); font-size: 18px; padding: 4px;
}

/* NAV */
.nav {
  display: flex;
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  position: sticky;
  top: 69px;
  z-index: 99;
}
.nav::-webkit-scrollbar { display: none; }
.nav-tab {
  flex: 1; min-width: 70px;
  padding: 10px 6px;
  text-align: center;
  font-size: 11px; font-weight: 700;
  color: var(--text3);
  border: none; background: none;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  font-family: 'Cairo', sans-serif;
  white-space: nowrap;
}
.nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.nav-tab .tab-icon { font-size: 18px; display: block; margin-bottom: 1px; }

/* PAGES */
.page { display: none; padding: 16px; padding-bottom: 60px; animation: fadeIn 0.2s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* SECTION TITLE */
.section-title {
  font-size: 13px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 12px; margin-top: 4px;
}

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.card-header {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 10px;
}
.card-title { font-size: 15px; font-weight: 700; }
.card-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* STATUS BADGES */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
}
.badge-sent { background: #fff3e0; color: #e8a838; }
.badge-returned { background: #e8f5e9; color: #5caa7f; }
.badge-issue { background: #ffeaea; color: #cc5f5f; }
.badge-partial { background: #e8f0ff; color: #5b80cc; }

/* APARTMENT PILLS */
.apt-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.apt-pill {
  padding: 6px 14px; border-radius: 20px;
  border: 2px solid var(--border);
  font-size: 12px; font-weight: 700;
  cursor: pointer; background: var(--surface);
  transition: all 0.15s; color: var(--text2);
  font-family: 'Cairo', sans-serif;
}
.apt-pill.active {
  background: var(--primary); border-color: var(--primary);
  color: white;
}

/* FORM ELEMENTS */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input, .form-select {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Cairo', sans-serif;
  font-size: 14px; color: var(--text);
  background: var(--surface);
  outline: none; transition: border-color 0.2s;
  appearance: none;
}
.form-input:focus, .form-select:focus { border-color: var(--primary); }

/* BUTTONS */
.btn {
  padding: 12px 20px; border-radius: var(--radius-sm);
  font-family: 'Cairo', sans-serif;
  font-size: 14px; font-weight: 700;
  border: none; cursor: pointer;
  transition: all 0.15s; display: inline-flex;
  align-items: center; gap: 6px;
}
.btn-primary {
  background: var(--primary); color: white;
  width: 100%; justify-content: center;
  box-shadow: 0 4px 14px rgba(204,95,95,0.3);
}
.btn-primary:active { transform: scale(0.98); }
.btn-outline {
  background: none; border: 1.5px solid var(--border);
  color: var(--text2);
}
.btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 8px; }
.btn-danger { background: #ffeaea; color: var(--danger); border: none; }
.btn-success { background: #e8f5e9; color: var(--ok); border: none; }
.btn-warn { background: #fff3e0; color: var(--warn); border: none; }

/* ITEM ROWS IN FORM */
.item-row {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-bottom: 8px;
}
.item-row-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.item-row-title { font-size: 13px; font-weight: 700; }
.item-counts { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.color-count-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 5px 10px;
  font-size: 12px;
}
.color-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

/* REVIEW ITEMS — color grouped */
.review-item-group {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 8px;
}
.review-item-header {
  background: var(--surface3);
  padding: 10px 14px;
  display: flex; align-items: center;
  justify-content: space-between;
}
.review-item-type { font-size: 13px; font-weight: 700; }
.review-item-count {
  background: var(--primary); color: white;
  border-radius: 12px; padding: 2px 10px;
  font-size: 12px; font-weight: 700;
}
.review-color-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-top: 1px solid var(--border);
}
.review-color-info { display: flex; align-items: center; gap: 8px; }
.review-color-name { font-size: 13px; color: var(--text2); }
.review-color-qty { font-size: 12px; font-weight: 700; color: var(--text); }
.review-status-btns { display: flex; gap: 5px; }

/* SUBMISSION LIST */
.submission-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s;
}
.submission-card:active { transform: scale(0.99); }
.sub-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.sub-apt { font-size: 16px; font-weight: 900; }
.sub-date { font-size: 11px; color: var(--text3); margin-top: 3px; }
.sub-meta { display: flex; gap: 10px; margin-top: 8px; }
.sub-stat { font-size: 12px; color: var(--text2); }
.sub-stat strong { color: var(--text); }
.sub-items-preview { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.item-chip {
  background: var(--surface3); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 8px;
  font-size: 11px; color: var(--text2);
}

/* STATS */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
  box-shadow: var(--shadow); text-align: center;
}
.stat-value { font-size: 26px; font-weight: 900; color: var(--primary); }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* MONTH SELECTOR */
.month-bar {
  display: flex; gap: 6px; overflow-x: auto;
  scrollbar-width: none; margin-bottom: 16px;
  padding-bottom: 4px;
}
.month-bar::-webkit-scrollbar { display: none; }
.month-chip {
  flex-shrink: 0; padding: 7px 14px;
  border-radius: 20px; font-size: 12px; font-weight: 700;
  border: 1.5px solid var(--border); background: var(--surface);
  cursor: pointer; color: var(--text2);
  font-family: 'Cairo', sans-serif; transition: all 0.15s;
}
.month-chip.active {
  background: var(--primary); border-color: var(--primary); color: white;
}

/* APT BREAKDOWN */
.apt-breakdown {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.apt-breakdown-row {
  display: flex; align-items: center;
  padding: 12px 16px; border-top: 1px solid var(--border);
}
.apt-breakdown-row:first-child { border-top: none; }
.apt-name { font-weight: 700; font-size: 14px; flex: 1; }
.apt-bar-wrap { flex: 2; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin: 0 12px; }
.apt-bar-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.6s ease; }
.apt-cost { font-size: 13px; font-weight: 700; color: var(--primary); min-width: 60px; text-align: left; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 200;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  padding: 20px; animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle {
  width: 40px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 0 auto 16px;
}
.modal-title { font-size: 17px; font-weight: 900; margin-bottom: 16px; }

/* TOAST */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--text); color: white;
  padding: 12px 20px; border-radius: 12px;
  font-size: 13px; font-weight: 600;
  z-index: 300; transition: transform 0.3s ease;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* LOADING */
.loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px; color: var(--text3);
  gap: 12px;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* EMPTY STATE */
.empty {
  text-align: center; padding: 40px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* DIVIDER */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* ADD ITEM SECTION */
.add-item-row {
  display: grid; grid-template-columns: 1fr 1fr auto;
  gap: 8px; align-items: end; margin-bottom: 8px;
}
.qty-control {
  display: flex; align-items: center; gap: 0;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  overflow: hidden; background: var(--surface);
}
.qty-btn {
  width: 36px; height: 44px; border: none;
  background: var(--surface3); cursor: pointer;
  font-size: 18px; font-weight: 700; color: var(--primary);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.qty-input {
  flex: 1; text-align: center; border: none;
  font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
  outline: none; background: var(--surface);
  min-width: 0;
}

/* Stain note */
.stain-note-area {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--warn);
  border-radius: var(--radius-sm);
  font-family: 'Cairo', sans-serif;
  font-size: 13px; color: var(--text);
  background: #fff9ee; outline: none;
  margin-top: 6px; resize: none;
}

/* Color map for dots */
.dot-white { background: #f0f0f0; border: 1px solid #ddd; }
.dot-grey { background: #9e9e9e; }
.dot-beige { background: #d4b896; }
.dot-blue { background: #7bafd4; }
.dot-pink { background: #f4a0b0; }
.dot-sugar { background: #f8d7da; border: 1px solid #ddd; }
.dot-green { background: #7dba84; }
.dot-old { background: #c8a882; }
.dot-new { background: #a8c4a8; }
.dot-leaves { background: #8fbb8f; }
.dot-beigepat { background: #d4c4a0; }
.dot-default { background: var(--accent); }
</style>
</head>

// ============================================================
// DATA LOADING
// ============================================================
async function fetchSheet(range) {
  const url = `${BASE_URL}/${encodeURIComponent(range)}?key=${API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Sheet fetch failed: ${res.status}`);
  const data = await res.json();
  return data.values || [];
}

async function loadAllData() {
  try {
    // Load prices
    const priceRows = await fetchSheet('ItemPrices!A2:B20');
    itemPrices = {};
    priceRows.forEach(r => { if(r[0]) itemPrices[r[0].trim()] = parseFloat(r[1]||0); });

    // Load color options
    const colorRows = await fetchSheet('ColorOptions!A2:B50');
    colorOptions = {};
    colorRows.forEach(r => {
      if(r[0]) {
        if(!colorOptions[r[0].trim()]) colorOptions[r[0].trim()] = [];
        if(r[1]) colorOptions[r[0].trim()].push(r[1].trim());
      }
    });

    // Load submissions
    const subRows = await fetchSheet('Submissions!A2:F500');
    allSubmissions = subRows.filter(r => r[0]).map(r => ({
      id: r[0]||'', apt: r[1]||'', timestamp: r[2]||'',
      paid: r[3]||'', submittedBy: r[4]||'', status: r[5]||'sent'
    }));

    // Load items
    const itemRows = await fetchSheet('Items!A2:H2000');
    allItems = itemRows.filter(r => r[0]).map(r => ({
      itemId: r[0]||'', submissionId: r[1]||'', timestamp: r[2]||'',
      type: r[3]||'', color: r[4]||'', qty: parseFloat(r[5]||0),
      unitPrice: parseFloat(r[6]||0), total: parseFloat(r[7]||0),
      status: r[8]||'', stainNote: r[9]||''
    }));

    renderHome();
    renderReview();
    renderStats();
    showToast('✅ تم تحديث البيانات');
  } catch(e) {
    showToast('❌ خطأ في تحميل البيانات: ' + e.message);
    console.error(e);
  }
}

// ============================================================
// HOME PAGE
// ============================================================
function renderHome() {
  const container = document.getElementById('homeContent');
  const sent = allSubmissions.filter(s => (s.status||'sent') === 'sent' || !s.status);
  const thisMonth = new Date().getMonth();
  const thisYear = new Date().getFullYear();

  const monthSubs = allSubmissions.filter(s => {
    if(!s.timestamp) return false;
    const d = excelDateToJS(s.timestamp);
    if(!d) return false;
    return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
  });
  const monthCost = monthSubs.reduce((sum, s) => {
    return sum + getSubmissionTotal(s.id);
  }, 0);

  let html = `
    <div class="stats-grid" style="margin-bottom:16px">
      <div class="stat-card">
        <div class="stat-value">${sent.length}</div>
        <div class="stat-label">عند الغسيل الآن</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">$${monthCost.toFixed(0)}</div>
        <div class="stat-label">تكلفة هذا الشهر</div>
      </div>
    </div>
    <div class="section-title">الطلبات عند الغسيل حالياً</div>
  `;

  if(sent.length === 0) {
    html += `<div class="empty"><div class="empty-icon">✨</div><div class="empty-text">لا توجد طلبات حالياً</div></div>`;
  } else {
    // Sort by date desc
    const sorted = [...sent].sort((a,b) => parseFloat(b.timestamp||0) - parseFloat(a.timestamp||0));
    sorted.forEach(s => {
      html += renderSubmissionCard(s, true);
    });
  }
  container.innerHTML = html;
}

function renderSubmissionCard(s, clickable=false) {
  const items = allItems.filter(i => i.submissionId === s.id);
  const total = items.reduce((sum,i) => sum + (i.total||0), 0);
  const itemCount = items.reduce((sum,i) => sum + (i.qty||0), 0);
  const d = s.timestamp ? excelDateToJS(s.timestamp) : null;
  const date = d ? formatDate(d) : '—';
  const statusBadge = getStatusBadge(s.status||'sent');

  // Group items summary
  const typeGroups = {};
  items.forEach(i => {
    if(!typeGroups[i.type]) typeGroups[i.type] = 0;
    typeGroups[i.type] += i.qty;
  });
  const chips = Object.entries(typeGroups).slice(0,4).map(([t,q]) =>
    `<span class="item-chip">${t} ×${q}</span>`
  ).join('');

  return `
    <div class="submission-card" onclick="${clickable ? `openReviewModal('${s.id}')` : ''}">
      <div class="sub-top">
        <div>
          <div class="sub-apt">${s.apt}</div>
          <div class="sub-date">📅 ${date} — ${s.submittedBy||''}</div>
        </div>
        <div>${statusBadge}</div>
      </div>
      <div class="sub-meta">
        <div class="sub-stat"><strong>${itemCount}</strong> قطعة</div>
        <div class="sub-stat">•</div>
        <div class="sub-stat"><strong>$${total.toFixed(0)}</strong></div>
      </div>
      <div class="sub-items-preview">${chips}</div>
    </div>
  `;
}

function getStatusBadge(status) {
  const map = {
    'sent': `<span class="badge badge-sent">⏳ عند الغسيل</span>`,
    'returned': `<span class="badge badge-returned">✅ مُسترجع</span>`,
    'issue': `<span class="badge badge-issue">⚠️ مشكلة</span>`,
    'partial': `<span class="badge badge-partial">📦 جزئي</span>`,
  };
  return map[status] || map['sent'];
}

// ============================================================
// NEW SUBMISSION
// ============================================================
function updateColorOptions() {
  const type = document.getElementById('addItemType').value;
  const colorSel = document.getElementById('addItemColor');
  colorSel.innerHTML = '<option value="">اللون (اختياري)</option>';
  if(colorOptions[type]) {
    colorOptions[type].forEach(c => {
      colorSel.innerHTML += `<option value="${c}">${c}</option>`;
    });
  }
}

function changeQty(delta) {
  const inp = document.getElementById('addItemQty');
  inp.value = Math.max(1, (parseInt(inp.value)||1) + delta);
}

function addItemToList() {
  const type = document.getElementById('addItemType').value;
  const color = document.getElementById('addItemColor').value;
  const qty = parseInt(document.getElementById('addItemQty').value)||1;
  if(!type) { showToast('⚠️ اختر نوع القطعة'); return; }

  const price = itemPrices[type] || 0;
  newItems.push({ type, color, qty, unitPrice: price, total: price*qty });
  renderNewItems();

  // Reset
  document.getElementById('addItemType').value = '';
  document.getElementById('addItemColor').innerHTML = '<option value="">اللون</option>';
  document.getElementById('addItemQty').value = 1;
}

function removeNewItem(idx) {
  newItems.splice(idx, 1);
  renderNewItems();
}

function renderNewItems() {
  const container = document.getElementById('itemsList');
  const totalEl = document.getElementById('newSubmitTotal');
  const totalAmt = document.getElementById('totalAmount');

  if(newItems.length === 0) {
    container.innerHTML = '';
    totalEl.style.display = 'none';
    return;
  }

  // Group by type
  const groups = {};
  newItems.forEach((item, idx) => {
    if(!groups[item.type]) groups[item.type] = [];
    groups[item.type].push({...item, idx});
  });

  let html = '';
  Object.entries(groups).forEach(([type, items]) => {
    const typeTotal = items.reduce((s,i) => s+i.total, 0);
    html += `<div class="item-row">
      <div class="item-row-header">
        <div class="item-row-title">${type}</div>
        <div style="font-size:13px;font-weight:700;color:var(--primary)">$${typeTotal.toFixed(0)}</div>
      </div>
      <div class="item-counts">`;
    items.forEach(item => {
      html += `<div class="color-count-chip">
        <div class="color-dot ${getColorDotClass(item.color)}"></div>
        <span>${item.color || 'بدون لون'}</span>
        <strong>×${item.qty}</strong>
        <button onclick="removeNewItem(${item.idx})" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:14px;padding:0 0 0 4px">✕</button>
      </div>`;
    });
    html += `</div></div>`;
  });

  container.innerHTML = html;

  const grandTotal = newItems.reduce((s,i) => s+i.total, 0);
  totalEl.style.display = 'block';
  totalAmt.textContent = '$' + grandTotal.toFixed(0);
}

async function submitNew() {
  const apt = document.getElementById('newApt').value;
  const submitter = document.getElementById('newSubmitter').value;
  const dateVal = document.getElementById('newDate').value;

  if(!apt) { showToast('⚠️ اختر الشقة'); return; }
  if(newItems.length === 0) { showToast('⚠️ أضف قطعة على الأقل'); return; }

  try {
    showToast('⏳ جاري الحفظ...');
    const submissionId = generateId();
    const ts = jsDateToExcel(new Date(dateVal || Date.now()));

    // Write submission row
    await appendToSheet('Submissions', [[submissionId, apt, ts, '', submitter, 'sent']]);

    // Write item rows
    const itemRows = newItems.map(item => [
      generateId(), submissionId, ts,
      item.type, item.color, item.qty,
      item.unitPrice, item.total, 'sent', ''
    ]);
    await appendToSheet('Items', itemRows);

    newItems = [];
    renderNewItems();
    document.getElementById('newApt').value = '';
    await loadAllData();
    showPage('home');
    showToast('✅ تم إرسال الطلب بنجاح!');
  } catch(e) {
    showToast('❌ خطأ في الحفظ: ' + e.message);
    console.error(e);
  }
}

// ============================================================
// REVIEW PAGE
// ============================================================
let currentStatusFilter = 'all';

function filterReview(apt, btn) {
  currentReviewFilter = apt;
  document.querySelectorAll('#reviewAptFilter .apt-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderReview();
}

function filterReviewStatus(status, btn) {
  currentStatusFilter = status;
  document.querySelectorAll('#reviewStatusFilter .apt-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderReview();
}

function renderReview() {
  const container = document.getElementById('reviewList');
  let subs = [...allSubmissions];
  if(currentReviewFilter !== 'all') subs = subs.filter(s => s.apt === currentReviewFilter);

  // Apply status filter
  if(currentStatusFilter !== 'all') {
    subs = subs.filter(s => (s.status||'sent') === currentStatusFilter);
  }
  // Sort by date desc
  subs.sort((a,b) => parseFloat(b.timestamp||0) - parseFloat(a.timestamp||0));

  if(subs.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">لا توجد طلبات للمراجعة</div></div>`;
    return;
  }

  container.innerHTML = subs.map(s => renderSubmissionCard(s, true)).join('');
}

// ============================================================
// REVIEW MODAL
// ============================================================
function openReviewModal(subId) {
  const sub = allSubmissions.find(s => s.id === subId);
  if(!sub) return;

  const items = allItems.filter(i => i.submissionId === subId);
  const total = items.reduce((s,i) => s+(i.total||0), 0);
  const dModal = sub.timestamp ? excelDateToJS(sub.timestamp) : null;
  const date = dModal ? formatDate(dModal) : '—';

  document.getElementById('modalTitle').textContent = `${sub.apt} — ${date}`;

  // Group items by type then color
  const groups = {};
  items.forEach(item => {
    if(!groups[item.type]) groups[item.type] = {};
    const key = item.color || 'بدون لون';
    if(!groups[item.type][key]) groups[item.type][key] = { qty: 0, items: [] };
    groups[item.type][key].qty += item.qty;
    groups[item.type][key].items.push(item);
  });

  let html = `
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <div class="stat-card" style="flex:1;padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:900;color:var(--primary)">$${total.toFixed(0)}</div>
        <div style="font-size:11px;color:var(--text3)">الإجمالي</div>
      </div>
      <div class="stat-card" style="flex:1;padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:900;color:var(--primary)">${items.reduce((s,i)=>s+i.qty,0)}</div>
        <div style="font-size:11px;color:var(--text3)">قطعة</div>
      </div>
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px">القطع حسب النوع والإلوان</div>
  `;

  Object.entries(groups).forEach(([type, colors]) => {
    const typeTotal = Object.values(colors).reduce((s,c) => s+c.qty, 0);
    html += `<div class="review-item-group">
      <div class="review-item-header">
        <div class="review-item-type">${type}</div>
        <div class="review-item-count">${typeTotal} قطعة</div>
      </div>`;
    Object.entries(colors).forEach(([color, data]) => {
      html += `<div class="review-color-row">
        <div class="review-color-info">
          <div class="color-dot ${getColorDotClass(color)}"></div>
          <div>
            <div class="review-color-name">${color}</div>
            <div class="review-color-qty">الكمية: ${data.qty}</div>
          </div>
        </div>
        <div class="review-status-btns">
          <button class="btn btn-sm btn-success" onclick="markItemStatus('${subId}','${type}','${color}','returned')">✅</button>
          <button class="btn btn-sm btn-warn" onclick="markItemStatus('${subId}','${type}','${color}','stain')">🟡</button>
          <button class="btn btn-sm btn-danger" onclick="markItemStatus('${subId}','${type}','${color}','notclean')">❌</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  html += `
    <div class="divider"></div>
    <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px">تحديث حالة الطلب</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
      <button class="btn btn-success" onclick="updateSubmissionStatus('${subId}','returned')">✅ مُسترجع بالكامل</button>
      <button class="btn btn-warn" onclick="updateSubmissionStatus('${subId}','partial')">📦 مُسترجع جزئياً</button>
      <button class="btn btn-danger" onclick="updateSubmissionStatus('${subId}','issue')">⚠️ بها مشكلة</button>
      <button class="btn btn-outline" onclick="updateSubmissionStatus('${subId}','sent')">⏳ لا يزال عند الغسيل</button>
    </div>
  `;

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('reviewModal').classList.add('open');
}

function closeModal() {
  document.getElementById('reviewModal').classList.remove('open');
}

async function markItemStatus(subId, type, color, status) {
  showToast('⏳ جاري الحفظ...');
  // In a real implementation this would update the sheet row
  // For now we update local state and show feedback
  allItems.forEach(item => {
    if(item.submissionId === subId && item.type === type && (item.color||'بدون لون') === color) {
      item.reviewStatus = status;
    }
  });
  const statusMap = { returned:'✅ تم التحديث', stain:'🟡 مُعلَّم كبقعة', notclean:'❌ غير نظيف' };
  showToast(statusMap[status] || '✅ تم');
}

async function updateSubmissionStatus(subId, status) {
  try {
    showToast('⏳ جاري الحفظ...');
    // Find the row number in the sheet
    const subIdx = allSubmissions.findIndex(s => s.id === subId);
    if(subIdx === -1) return;

    const rowNum = subIdx + 2; // +2 for header row and 0-index
    await updateSheetCell(`Submissions!F${rowNum}`, status);

    allSubmissions[subIdx].status = status;
    renderHome();
    renderReview();
    closeModal();
    showToast('✅ تم تحديث الحالة');
  } catch(e) {
    showToast('❌ خطأ: ' + e.message);
  }
}

// ============================================================
// STATS PAGE
// ============================================================
function renderStats() {
  // Build month list from data
  const months = new Set();
  allSubmissions.forEach(s => {
    if(!s.timestamp) return;
    const d = excelDateToJS(s.timestamp);
    if(!d) return;
    months.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  });
  const monthList = [...months].sort().reverse();

  // Add current month if not present
  const now = new Date();
  const curMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  if(!months.has(curMonth)) monthList.unshift(curMonth);

  if(!currentMonth) currentMonth = monthList[0];

  const monthBar = document.getElementById('monthBar');
  monthBar.innerHTML = monthList.map(m => {
    const [y, mo] = m.split('-');
    const label = new Date(y, mo-1, 1).toLocaleDateString('ar-EG', {month:'short', year:'numeric'});
    return `<button class="month-chip ${m===currentMonth?'active':''}" onclick="selectMonth('${m}', this)">${label}</button>`;
  }).join('');

  updateStatsForMonth(currentMonth);
}

function selectMonth(month, btn) {
  currentMonth = month;
  document.querySelectorAll('.month-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  updateStatsForMonth(month);
}

function updateStatsForMonth(month) {
  const [y, mo] = month.split('-').map(Number);
  const subs = allSubmissions.filter(s => {
    if(!s.timestamp) return false;
    const d = excelDateToJS(s.timestamp);
    if(!d) return false;
    return d.getFullYear() === y && d.getMonth()+1 === mo;
  });

  const totalCost = subs.reduce((sum,s) => sum + getSubmissionTotal(s.id), 0);
  const totalItems = subs.reduce((sum,s) => {
    return sum + allItems.filter(i => i.submissionId === s.id).reduce((s,i) => s+(i.qty||0), 0);
  }, 0);
  const avgOrder = subs.length ? (totalCost / subs.length) : 0;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-value">$${totalCost.toFixed(0)}</div><div class="stat-label">إجمالي التكلفة</div></div>
    <div class="stat-card"><div class="stat-value">${subs.length}</div><div class="stat-label">عدد الطلبات</div></div>
    <div class="stat-card"><div class="stat-value">${totalItems}</div><div class="stat-label">إجمالي القطع</div></div>
    <div class="stat-card"><div class="stat-value">$${avgOrder.toFixed(0)}</div><div class="stat-label">متوسط الطلب</div></div>
  `;

  // Apt breakdown
  const apts = ['8A', '17A', '28A', 'Zayed 2000'];
  const aptCosts = apts.map(apt => ({
    apt, cost: subs.filter(s=>s.apt===apt).reduce((sum,s) => sum+getSubmissionTotal(s.id), 0)
  }));
  const maxCost = Math.max(...aptCosts.map(a=>a.cost), 1);

  document.getElementById('aptBreakdown').innerHTML = aptCosts.map(a => `
    <div class="apt-breakdown-row">
      <div class="apt-name">${a.apt}</div>
      <div class="apt-bar-wrap"><div class="apt-bar-fill" style="width:${(a.cost/maxCost*100).toFixed(0)}%"></div></div>
      <div class="apt-cost">$${a.cost.toFixed(0)}</div>
    </div>
  `).join('');

  // Top items
  const monthItems = allItems.filter(i => {
    const sub = allSubmissions.find(s => s.id === i.submissionId);
    if(!sub || !sub.timestamp) return false;
    const d = excelDateToJS(sub.timestamp);
    if(!d) return false;
    return d.getFullYear() === y && d.getMonth()+1 === mo;
  });

  const typeCounts = {};
  monthItems.forEach(i => {
    if(!typeCounts[i.type]) typeCounts[i.type] = 0;
    typeCounts[i.type] += i.qty;
  });
  const sorted = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxQty = sorted[0]?.[1] || 1;

  document.getElementById('topItems').innerHTML = sorted.length ? sorted.map(([type, qty]) => `
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;font-weight:600">${type}</span>
        <span style="font-size:13px;font-weight:700;color:var(--primary)">${qty} قطعة</span>
      </div>
      <div style="height:6px;background:var(--bg);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${(qty/maxQty*100).toFixed(0)}%;background:var(--primary);border-radius:3px;transition:width 0.6s"></div>
      </div>
    </div>
  `).join('') : '<div class="empty-text" style="text-align:center;color:var(--text3)">لا توجد بيانات</div>';
}

// ============================================================
// HELPERS
// ============================================================
function getSubmissionTotal(subId) {
  return allItems.filter(i => i.submissionId === subId).reduce((s,i) => s+(i.total||0), 0);
}

function excelDateToJS(val) {
  if(!val) return null;
  const str = String(val).trim();

  // Format: "7/26/2025 16:32:39" or "7/26/2025" (M/D/YYYY)
  const mdyMatch = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(mdyMatch) {
    return new Date(parseInt(mdyMatch[3]), parseInt(mdyMatch[1])-1, parseInt(mdyMatch[2]));
  }

  // Excel serial number like 45864.70863
  const num = parseFloat(str);
  if(!isNaN(num) && num > 40000 && num < 60000) {
    return new Date((Math.floor(num) - 25569) * 86400 * 1000);
  }

  return null;
}

function jsDateToExcel(date) {
  return (date.getTime() / 86400000) + 25569;
}

function formatDate(d) {
  return d.toLocaleDateString('ar-EG', {day:'numeric', month:'short', year:'numeric'});
}

function generateId() {
  return Math.random().toString(36).substr(2,8);
}

function getColorDotClass(color) {
  const map = {
    'ابيض':'dot-white','بيج':'dot-beige','رمادي':'dot-grey',
    'ازرق':'dot-blue','بمبي':'dot-pink','سكري':'dot-sugar',
    'اخضر':'dot-green','مشجر قديم':'dot-old','مشجر جديد':'dot-new',
    'اوراق شجر':'dot-leaves','بيج مشجر':'dot-beigepat','مشجر':'dot-new'
  };
  return map[color] || 'dot-default';
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const tabs = ['home','new','review','stats'];
  document.querySelectorAll('.nav-tab')[tabs.indexOf(name)]?.classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ============================================================
// GOOGLE SHEETS WRITE
// ============================================================
async function appendToSheet(sheetName, rows) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'append', sheet: sheetName, rows: rows })
  });
  if(!res.ok) throw new Error('Write failed: ' + res.status);
  return res.json();
}

async function updateSheetCell(range, value) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'update', sheet: 'Submissions', range: range, value: value })
  });
  if(!res.ok) throw new Error('Update failed: ' + res.status);
  return res.json();
}

// Close modal on overlay click
document.getElementById('reviewModal').addEventListener('click', function(e) {
  if(e.target === this) closeModal();
});
